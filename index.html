<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#131313" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shipud Flow" />
    <meta name="description" content="Daily workout trainer — Kegel, Abs, and more" />
    <title>Shipud Flow</title>
    <script>
      // Debug: show errors on-screen for mobile debugging
      window.onerror = function(msg, url, line, col, err) {
        var d = document.getElementById('_dbg')
        if (!d) { d = document.createElement('div'); d.id = '_dbg'; d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;font:12px monospace;padding:12px;max-height:50vh;overflow:auto;'; document.body.appendChild(d); }
        d.innerHTML += '<p>' + msg + ' @ ' + url + ':' + line + ':' + col + '</p>';
      }
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('_dbg')
        if (!d) { d = document.createElement('div'); d.id = '_dbg'; d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;font:12px monospace;padding:12px;max-height:50vh;overflow:auto;'; document.body.appendChild(d); }
        d.innerHTML += '<p>Promise: ' + (e.reason ? e.reason.message || e.reason : 'unknown') + '</p>';
      })
      // Force-clear stale service workers on first load
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister() })
        })
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name) })
          })
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
